name: PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    name: Lint + Type Check + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn turbo run lint

      - name: Type check
        run: yarn turbo run type-check

      - name: Test
        run: yarn turbo run test

  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - uses: preactjs/compressed-size-action@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          build-script: 'turbo run build --filter=@makeforest/web'
          pattern: '.next/static/**/*.{js,css}'
          strip-hash: '\.[a-f0-9]{8,}\.'

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel Preview
        id: vercel-preview
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          REPO="${{ github.repository }}"
          SHA="${{ github.event.pull_request.head.sha }}"
          for i in $(seq 1 30); do
            DEPLOYMENT_ID=$(gh api "repos/$REPO/deployments?sha=$SHA" \
              --jq '[.[] | select(.environment | startswith("Preview"))][0].id' 2>/dev/null)
            if [ -n "$DEPLOYMENT_ID" ] && [ "$DEPLOYMENT_ID" != "null" ]; then
              STATE=$(gh api "repos/$REPO/deployments/$DEPLOYMENT_ID/statuses" \
                --jq '.[0].state' 2>/dev/null)
              TARGET_URL=$(gh api "repos/$REPO/deployments/$DEPLOYMENT_ID/statuses" \
                --jq '.[0].target_url' 2>/dev/null)
              if [ "$STATE" = "success" ] && [ -n "$TARGET_URL" ] && [ "$TARGET_URL" != "null" ]; then
                echo "url=$TARGET_URL" >> $GITHUB_OUTPUT
                echo "Preview URL: $TARGET_URL"
                exit 0
              fi
            fi
            echo "Attempt $i/30: not ready yet, retrying in 10s..."
            sleep 10
          done
          echo "Timeout: Vercel preview not ready after 5 minutes"
          exit 1

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.vercel-preview.outputs.url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json
          githubToken: ${{ secrets.GITHUB_TOKEN }}
