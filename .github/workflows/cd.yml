name: CD

on:
  push:
    branches: [main]

jobs:
  # ── 웹(Next.js) → Vercel ────────────────────────────────────
  deploy-web:
    name: Deploy Web (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      # Vercel은 자체적으로 Next.js 빌드를 수행하므로
      # CLI로 배포 트리거만 하면 됩니다
      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 서버(Express) → Railway ─────────────────────────────────
  deploy-server:
    name: Deploy Server (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # DB 마이그레이션을 배포 전에 먼저 실행
      # (새 스키마가 올라간 서버가 뜨기 전에 DB가 준비돼야 함)
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Run DB migrations
        run: npx prisma migrate deploy
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}

      # Railway CLI로 서버 배포
      # Railway는 apps/server/Dockerfile을 자동으로 감지해 빌드합니다
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service MakeForestServer --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
