name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-test:
    name: Lint + Type Check + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn turbo run lint

      - name: Type check
        run: yarn turbo run type-check

      - name: Test
        run: yarn turbo run test

  load-test:
    name: Load Test (Docker k6)
    if: github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) PostgreSQL + Express 서버 컨테이너 시작
      - name: Start test environment
        run: docker compose -f docker-compose.test.yml up -d --wait
        env:
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}

      - name: Server logs (on failure)
        if: failure()
        run: docker compose -f docker-compose.test.yml logs server

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      # 2) DB 마이그레이션
      - name: Migrate DB
        run: npx prisma migrate deploy
        working-directory: packages/db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/makeforest_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/makeforest_test

      # 3) k6 중간 부하 (API 25VU + Toggle 5VU + SSE 20VU / 1분)
      #    thresholds 초과 시 exit 1 → 잡 실패 → merge 차단
      - name: Install k6
        run: |
          curl -fsSL https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq && sudo apt-get install -y k6

      - name: k6 load test
        run: |
          k6 run load-test/script.js \
            --env API_VUS=25 \
            --env TOGGLE_VUS=5 \
            --env SSE_VUS=20 \
            --env DURATION=1m \
            --env TARGET_URL=http://localhost:4000 \
            --env INTERNAL_SECRET=${{ secrets.INTERNAL_API_SECRET }}

      - name: Debug files
        run: |
          pwd
          ls -R

      # 4) 결과를 PR에 코멘트 (성공/실패 무관)
      - name: Post result to PR
        if: always()
        run: node load-test/post-result.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Cleanup Docker
        if: always()
        run: docker compose -f docker-compose.test.yml down
