services:
  postgres:
    image: postgres:16-alpine
    container_name: makeforest_dev_db
    environment:
      POSTGRES_DB: makeforest_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - makeforest_dev_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d makeforest_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: makeforest_dev_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  makeforest_dev_pgdata:
