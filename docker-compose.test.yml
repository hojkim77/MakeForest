services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: makeforest_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/makeforest_test
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/makeforest_test
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      NODE_ENV: test
      CLIENT_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/health', res =>
            process.exit(res.statusCode === 200 ? 0 : 1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
