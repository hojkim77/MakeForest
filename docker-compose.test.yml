services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: makeforest_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/makeforest_test
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/makeforest_test
      REDIS_URL: redis://redis:6379
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      NODE_ENV: test
      CLIENT_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
